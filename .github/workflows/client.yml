name: Client CI

on:
  push:
    branches: [master]
    paths: [client/**, server/src/codegen.py, server/src/models/**, .github/workflows/client.yml]
  pull_request:
    branches: [master]
    paths: [client/**, server/src/codegen.py, server/src/models/**, .github/workflows/client.yml]

defaults:
  run:
    working-directory: client

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Check generated types are up to date
        working-directory: server
        run: uv run python -m src.codegen --check
